<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LesMichels</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

  <header class="header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-les">Les</span><span class="logo-michels">Michels</span>
        <span class="logo-tag">Bingo</span>
      </div>
      <nav class="nav">
        <button class="nav-btn active" data-page="bingo">Bingo</button>
        <button class="nav-btn disabled" title="Bientôt disponible">Tier List</button>
        <button class="nav-btn disabled" title="Bientôt disponible">Planning</button>
      </nav>
    </div>
  </header>

  <main class="main">

    <!-- ═══════════════════ BINGO PAGE ═══════════════════ -->
    <section id="page-bingo" class="page active">

      <!-- ── Barre des thèmes ── -->
      <div class="themes-bar">
        <span class="themes-bar-label">Thème :</span>
        <div id="themes-list" class="themes-list"></div>
        <button class="btn-new-theme" id="btn-new-theme" title="Nouveau thème">+ Nouveau thème</button>
        <button class="btn-archived-themes" id="btn-archived-themes" title="Thèmes archivés">📦 Thèmes archivés</button>
      </div>

      <div class="bingo-layout">

        <!-- ── Panneau gauche : Cases du thème ── -->
        <aside class="panel panel-elements">
          <div class="panel-header">
            <h2>Cases</h2>
            <span class="element-count" id="element-count">0</span>
          </div>

          <div class="add-element-form">
            <input
              type="text"
              id="new-element-input"
              placeholder="Ajouter une case..."
              maxlength="80"
            />
            <button id="btn-add-element" class="btn-icon" title="Ajouter">+</button>
          </div>

          <div class="elements-tabs">
            <button class="tab-btn active" data-tab="active">Actifs</button>
            <button class="tab-btn" data-tab="archived">Archivés</button>
          </div>

          <ul id="elements-list" class="elements-list"></ul>
          <ul id="elements-archived" class="elements-list hidden"></ul>
        </aside>

        <!-- ── Panneau central : Grille ── -->
        <div class="panel panel-grid">

          <!-- Sélecteur de grilles du thème -->
          <div class="grids-bar">
            <div id="grids-list" class="grids-list"></div>
            <button class="btn-new-grid" id="btn-new-grid" title="Nouvelle grille">+ Grille</button>
          </div>

          <!-- Toolbar grille -->
          <div class="grid-toolbar">
            <div class="grid-size-control">
              <label>Taille</label>
              <button class="size-btn" id="btn-size-minus">−</button>
              <span id="grid-size-display">4×4</span>
              <button class="size-btn" id="btn-size-plus">+</button>
            </div>

            <div class="grid-size-control">
              <label>Texte</label>
              <button class="size-btn" id="btn-font-minus">−</button>
              <input type="number" id="font-scale-input" class="scale-input" min="50" max="300" step="10" value="100" title="Taille du texte en %" />
              <span class="scale-unit">%</span>
              <button class="size-btn" id="btn-font-plus">+</button>
            </div>

            <div class="grid-size-control">
              <label>Police</label>
              <select id="font-family-select" class="font-select"></select>
            </div>

            <div class="grid-actions">
              <button class="btn-action" id="btn-generate">🎲 Générer</button>
              <button class="btn-action btn-manual" id="btn-manual">✋ Manuel</button>
              <button class="btn-action btn-reset" id="btn-reset">↺ Reset</button>
            </div>
          </div>

          <div id="grid-error" class="grid-error hidden"></div>

          <div id="grid-wrapper" class="grid-wrapper">
            <div id="bingo-grid" class="bingo-grid"></div>
          </div>

          <div id="bingo-message" class="bingo-message hidden"></div>
        </div>

      </div>
    </section>

  </main>

  <!-- Modal thèmes archivés -->
  <div id="modal-archived-themes" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Thèmes archivés</h3>
        <button class="modal-close" id="btn-close-archived-modal">✕</button>
      </div>
      <div id="archived-themes-list" class="archived-themes-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
